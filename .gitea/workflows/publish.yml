name: Publish to NPM

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"

jobs:
  publish:
    runs-on: [deploy, uopve]
    container:
      image: node:20-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - run: npm install
      - run: npm run build

      # - name: Setup pnpm
      #   run: |
      #     corepack enable
      #     corepack prepare pnpm@8 --activate

      # - run: pnpm install
      # - run: pnpm build

      # - name: Build package
      #   run: npm run build

      - name: Publish to NPM
        run: |
          npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_SEC }}
          npm publish --access public
